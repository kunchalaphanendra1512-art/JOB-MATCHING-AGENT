services:
  - type: web
    name: hiresense-ai
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && npm install && npm run build"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
